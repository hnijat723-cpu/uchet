<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Uçot — müştərilər və xərclər</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f5f5fb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111225" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Uçot">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png" type="image/png">

<style>
  @font-face {
    font-family: "Inter"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/inter-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Inter"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/inter-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  :root {
    --bg: #f5f5fb;
    --card: #ffffff;
    --fill: #f0f0f8;
    --ink: #1b1c30;
    --muted: #83879e;
    --muted-2: #adb1c6;
    --line: #ececf4;
    --line-2: #f2f2f9;
    --accent: #5b57eb;
    --accent-2: #8a7cf7;
    --accent-deep: #4a45d6;
    --grad: linear-gradient(135deg, #7b78f6, #5654e8);
    --glow: rgba(91,87,235,.26);
    --ring: rgba(91,87,235,.20);
    --accent-soft: #ecebfd;
    --good: #17a866;
    --good-soft: #e4f6ee;
    --warn: #d97706;
    --warn-soft: #fdf1e2;
    --red: #f0424a;
    --red-soft: #fdebec;
    --bar-bg: rgba(255,255,255,.86);
    --hi: rgba(255,255,255,.6);
    --shadow: 0 1px 2px rgba(30,27,75,.04), 0 8px 24px rgba(30,27,75,.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111225;
      --card: #1b1d36;
      --fill: #242745;
      --ink: #eceefb;
      --muted: #9a9fc4;
      --muted-2: #6b7099;
      --line: rgba(255,255,255,.08);
      --line-2: rgba(255,255,255,.05);
      --accent: #8b8bff;
      --accent-2: #a99cff;
      --accent-deep: #6f6ff5;
      --grad: linear-gradient(135deg, #8f86ff, #6a63f0);
      --glow: rgba(139,139,255,.32);
      --ring: rgba(139,139,255,.30);
      --accent-soft: rgba(139,139,255,.16);
      --good: #35c98e;
      --good-soft: rgba(53,201,142,.14);
      --warn: #fbbf6a;
      --warn-soft: rgba(251,146,60,.14);
      --red: #ff6b74;
      --red-soft: rgba(255,107,116,.14);
      --bar-bg: rgba(17,18,37,.8);
      --hi: rgba(255,255,255,.05);
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 26px rgba(0,0,0,.45);
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background-color: var(--bg);
    color: var(--ink);
    font: 15px/1.5 "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    letter-spacing: -.006em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 26px 18px 100px; }
  .num { font-variant-numeric: tabular-nums; }

  /* header */
  .top { display: flex; align-items: center; gap: 13px; margin-bottom: 20px; }
  .logo {
    width: 46px; height: 46px; flex: 0 0 auto; display: block; object-fit: contain;
    filter: drop-shadow(0 5px 9px rgba(20,18,50,.26));
  }
  h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -.03em; color: var(--ink); }
  .top .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* tabs (desktop pills) */
  .tabs { display: inline-flex; gap: 4px; background: var(--line-2); border: 1px solid var(--line); padding: 5px; border-radius: 14px; margin-bottom: 22px; }
  .tab {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    padding: 8px 15px; border-radius: 10px; font: inherit; font-weight: 600; transition: .16s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }
  .tab.active .ti { color: var(--accent); }
  .tab .tl { display: block; }
  .tab .ti { display: inline-flex; }
  .tab .ti svg { width: 17px; height: 17px; display: block; }

  /* hero + mini stats */
  .hero {
    background: var(--grad); color: #fff; border-radius: 22px; padding: 18px 20px;
    box-shadow: 0 14px 30px var(--glow); margin-bottom: 12px;
  }
  .hero .hk { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.82); }
  .hero .hv { font-size: 31px; font-weight: 800; letter-spacing: -.03em; margin-top: 5px; }
  .mini-row { display: flex; gap: 10px; margin-bottom: 22px; }
  .mini { flex: 1; min-width: 0; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 11px 13px; box-shadow: var(--shadow); }
  .mini .mk { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini .mv { font-size: 16px; font-weight: 800; letter-spacing: -.02em; margin-top: 3px; }
  .mini .mv.good { color: var(--good); } .mini .mv.red { color: var(--red); } .mini .mv.warn { color: var(--warn); }

  /* section label */
  .sec { display: flex; align-items: baseline; gap: 8px; margin: 4px 4px 10px; font-size: 13px; font-weight: 700; color: var(--ink); }
  .sec-c { color: var(--muted-2); font-weight: 600; font-size: 12px; }

  /* list of clean rows inside a card */
  .rows { background: var(--card); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow), inset 0 1px 0 var(--hi); overflow: hidden; margin-bottom: 14px; }
  .row + .row { border-top: 1px solid var(--line-2); }
  .row.paused { opacity: .58; }
  .row-head { display: flex; align-items: center; gap: 12px; padding: 12px 15px; cursor: pointer; }
  .row-head.static { cursor: default; }
  .ava {
    width: 42px; height: 42px; border-radius: 50%; flex: 0 0 auto;
    display: grid; place-items: center; font-weight: 700; font-size: 17px; color: #fff;
    background: hsl(var(--h,220) 58% 55%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
  }
  .row-mid { flex: 1; min-width: 0; }
  .row-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 7px; min-width: 0; }
  .row-title .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-end { text-align: right; flex-shrink: 0; }
  .row-val { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .row-val.good { color: var(--good); } .row-val.red { color: var(--red); } .row-val.warn { color: var(--warn); }
  .row-vsub { font-size: 11px; color: var(--muted-2); margin-top: 1px; }
  .chev { color: var(--muted-2); display: flex; transition: transform .18s; flex-shrink: 0; }
  .chev svg { width: 18px; height: 18px; }
  .row.open .chev { transform: rotate(90deg); }
  .row-body { display: none; padding: 0 15px 15px; }
  .row.open .row-body { display: block; }
  .row-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

  .tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .01em; background: var(--accent-soft); color: var(--accent); flex-shrink: 0; }
  .tag.paused { background: var(--line-2); color: var(--muted); }

  /* badges (detail) */
  .badges { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
  .badge { font-size: 12.5px; padding: 5px 10px; border-radius: 9px; display: inline-flex; gap: 6px; align-items: baseline; background: var(--line-2); }
  .badge .bl { color: var(--muted); }
  .badge b { font-weight: 650; }
  .badge.good { background: var(--good-soft); color: var(--good); } .badge.good .bl { color: var(--good); opacity: .8; }
  .badge.warn { background: var(--warn-soft); color: var(--warn); } .badge.warn .bl { color: var(--warn); opacity: .8; }
  .badge.red { background: var(--red-soft); color: var(--red); } .badge.red .bl { color: var(--red); opacity: .8; }

  /* buttons */
  input, button, textarea { font: inherit; }
  .btn {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 12px; padding: 9px 14px; cursor: pointer; transition: .14s; font-weight: 600; font-size: 13px;
  }
  .btn:hover { background: var(--fill); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { border: none; color: #fff; font-weight: 700; background: var(--accent); box-shadow: 0 4px 14px var(--glow); }
  .btn.primary:hover { background: var(--accent-deep); }
  .btn.primary:active { transform: translateY(1px); box-shadow: 0 2px 8px var(--glow); }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { background: var(--red-soft); }
  .btn.armed { background: var(--red); border-color: var(--red); color: #fff; }
  .btn.tiny { padding: 5px 9px; font-size: 12px; }
  .btn.ico { padding: 6px 8px; border: none; background: transparent; color: var(--muted-2); }
  .btn.ico:hover { color: var(--red); background: var(--red-soft); }

  /* inputs */
  input {
    background: var(--fill); border: 1.5px solid transparent; color: var(--ink);
    border-radius: 13px; padding: 12px 14px; outline: none; transition: .15s; width: 100%;
  }
  input::placeholder { color: var(--muted-2); }
  input:focus { border-color: var(--accent); background: var(--card); box-shadow: 0 0 0 3px var(--ring); }
  input[type="date"] { color-scheme: light dark; }

  /* inline add-payment inside a row */
  .payadd { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 4px 0 12px; }
  .payadd input { flex: 1 1 120px; }
  .payadd input[type="date"] { flex: 1 1 130px; }
  .payadd .btn { flex: 1 1 100%; }

  table.pays { width: 100%; border-collapse: collapse; }
  table.pays td { padding: 8px 2px; border-top: 1px solid var(--line-2); font-size: 13.5px; }
  table.pays .amt { font-weight: 600; text-align: right; white-space: nowrap; }
  table.pays .dt { color: var(--muted); width: 108px; white-space: nowrap; }
  table.pays .pn { color: var(--muted); }
  table.pays .del { width: 30px; text-align: right; }
  .empty-pays { color: var(--muted-2); font-size: 13px; padding: 8px 0; }

  /* income inline fields */
  .inc-name {
    font-size: 15px; font-weight: 700; padding: 3px 6px; border-radius: 8px;
    background: transparent; border: 1px solid transparent; margin-left: -6px;
  }
  .inc-name:focus { border-color: var(--accent); background: var(--fill); }
  .inc-fields { display: flex; gap: 12px; margin-top: 6px; }
  .inc-fields label { font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .inc-fields input { width: 88px; padding: 7px 10px; border-radius: 10px; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; border: 1px dashed var(--line); border-radius: 20px; background: var(--card); }

  .tools { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 26px; }
  .tools .hint { flex-basis: 100%; text-align: center; font-size: 12px; color: var(--muted-2); margin-bottom: 4px; }

  /* FAB */
  .fab {
    position: fixed; right: 20px; bottom: 26px; z-index: 25;
    width: 58px; height: 58px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 30px; font-weight: 400; line-height: 1;
    display: grid; place-items: center; padding-bottom: 3px;
    box-shadow: 0 10px 26px var(--glow), 0 2px 6px rgba(20,18,50,.25);
    transition: transform .15s, background .15s;
  }
  .fab:hover { background: var(--accent-deep); }
  .fab:active { transform: scale(.94); }

  /* bottom sheet */
  .sheet-backdrop { position: fixed; inset: 0; z-index: 39; background: rgba(10,10,30,.45); opacity: 0; pointer-events: none; transition: opacity .2s; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; margin: 0 auto; max-width: 560px;
    background: var(--card); border-top-left-radius: 26px; border-top-right-radius: 26px;
    padding: 10px 20px calc(22px + env(safe-area-inset-bottom));
    box-shadow: 0 -12px 44px rgba(10,10,40,.28);
    transform: translateY(112%); transition: transform .28s cubic-bezier(.4,0,.2,1);
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 42px; height: 4px; border-radius: 2px; background: var(--line); margin: 2px auto 14px; }
  .sheet-title { font-size: 18px; font-weight: 800; letter-spacing: -.02em; margin: 0 2px 16px; }
  .sheet form { display: none; flex-direction: column; gap: 10px; }
  .sheet form.on { display: flex; }
  .sheet .btn.primary { padding: 13px; font-size: 15px; margin-top: 4px; }

  [hidden] { display: none !important; }

  @media (max-width: 640px) {
    .wrap { padding: calc(14px + env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom)); }
    .mini-row { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .mini-row::-webkit-scrollbar { display: none; }
    .mini { flex: 0 0 42%; }

    .fab { right: 16px; bottom: calc(80px + env(safe-area-inset-bottom)); }

    /* bottom nav */
    .tabs {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
      display: flex; gap: 0; margin: 0; border-radius: 0; border: none; border-top: 1px solid var(--line);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      background: var(--bar-bg); -webkit-backdrop-filter: saturate(180%) blur(20px); backdrop-filter: saturate(180%) blur(20px);
      box-shadow: 0 -6px 24px rgba(0,0,0,.10);
    }
    .tab { flex: 1; flex-direction: column; gap: 5px; padding: 4px 2px; border-radius: 14px; font-size: 10.5px; font-weight: 600; color: var(--muted); }
    .tab .ti { display: grid; place-items: center; height: 28px; }
    .tab .ti svg { width: 25px; height: 25px; }
    .tab.active { color: var(--accent); }
    .tab.active .ti { color: var(--accent); }
    .tab.active .ti svg { stroke-width: 2.1; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <img class="logo" src="icon-192.png" alt="" width="46" height="46">
    <div>
      <h1>Uçot</h1>
      <div class="sub"><span id="today"></span></div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="clients"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.1"/><path d="M2.8 19.2a6.2 6.2 0 0 1 12.4 0"/><path d="M16.5 5.3a3 3 0 0 1 0 5.6"/><path d="M17.7 19.2a6.2 6.2 0 0 0-2.4-4.9"/></svg></span><span class="tl">Müştərilər</span></button>
    <button class="tab" data-tab="income"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.4"/><path d="M12 7.7v8.6"/><path d="M8.6 12.9 12 16.3l3.4-3.4"/></svg></span><span class="tl">Daxilolma</span></button>
    <button class="tab" data-tab="staff"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7.5" width="18" height="12.5" rx="2.4"/><path d="M8.3 7.5V6.2a2.2 2.2 0 0 1 2.2-2.2h3a2.2 2.2 0 0 1 2.2 2.2v1.3"/><path d="M3 12.4h18"/></svg></span><span class="tl">İşçilər</span></button>
    <button class="tab" data-tab="expenses"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.6h12v16.8l-2.2-1.4-2.3 1.4-2.3-1.4-2.2 1.4L6 20.4z"/><path d="M9 8h6M9 11.6h6M9 15.2h4"/></svg></span><span class="tl">Xərclər</span></button>
  </div>

  <section id="view-clients">
    <div id="clientHero"></div>
    <div class="sec">Müştərilər <span class="sec-c" id="clientCount"></span></div>
    <div id="list"></div>
  </section>

  <section id="view-income" hidden>
    <div id="incomeHero"></div>
    <div class="sec">Birdəfəlik daxilolmalar</div>
    <div id="incomeList"></div>
  </section>

  <section id="view-staff" hidden>
    <div id="staffHero"></div>
    <div class="sec">İşçilər <span class="sec-c" id="staffCount"></span></div>
    <div id="staffList"></div>
  </section>

  <section id="view-expenses" hidden>
    <div id="expHero"></div>
    <div class="sec">Xərclər</div>
    <div id="expList"></div>
  </section>

  <div class="tools">
    <div class="hint">Məlumatlar yalnız bu brauzerdə saxlanılır. Mütəmadi ehtiyat nüsxə saxlayın.</div>
    <button class="btn tiny" id="exportBtn">↓ İxrac (ehtiyat)</button>
    <button class="btn tiny" id="importBtn">↑ İdxal</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>

</div>

<button class="fab" id="fab" aria-label="Əlavə et">+</button>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Yeni müştəri</div>

  <form id="addForm" data-sheet="clients" autocomplete="off">
    <input id="cName" placeholder="Müştəri / şirkət adı" required>
    <input id="cMonthly" type="number" min="0" step="1" placeholder="aylıq ödəniş, ₼">
    <input id="cCost" type="number" min="0" step="1" placeholder="aylıq maya, ₼">
    <input id="cNoteIn" placeholder="qeyd (istəyə görə)">
    <button class="btn primary" type="submit">Müştəri əlavə et</button>
  </form>

  <form id="incomeForm" data-sheet="income" autocomplete="off">
    <input id="iName" placeholder="Müştəri adı" required>
    <input id="iTotal" type="number" min="0" step="1" placeholder="cəmi məbləğ, ₼" required>
    <input id="iTaken" type="number" min="0" step="1" placeholder="artıq alınıb, ₼">
    <button class="btn primary" type="submit">Daxilolma əlavə et</button>
  </form>

  <form id="staffForm" data-sheet="staff" autocomplete="off">
    <input id="sName" placeholder="İşçi adı" required>
    <input id="sRole" placeholder="Vəzifə (fotoqraf, video, motion…)">
    <input id="sNote" placeholder="qeyd (istəyə görə)">
    <button class="btn primary" type="submit">İşçi əlavə et</button>
  </form>

  <form id="expForm" data-sheet="expenses" autocomplete="off">
    <input id="eTitle" placeholder="Haraya / nəyə" required>
    <input id="eAmount" type="number" min="0" step="1" placeholder="məbləğ, ₼" required>
    <input id="eDate" type="date" required>
    <input id="eNote" placeholder="şərh (istəyə görə)">
    <button class="btn primary" type="submit">Xərci yaz</button>
  </form>
</div>

<script>
"use strict";

const KEY = "clients-tracker/v1";
const $ = (s, r=document) => r.querySelector(s);

const AZ_MONTHS = ["yanvar","fevral","mart","aprel","may","iyun","iyul","avqust","sentyabr","oktyabr","noyabr","dekabr"];
const AZ_MONTHS_SHORT = ["yan","fev","mar","apr","may","iyn","iyl","avq","sen","okt","noy","dek"];
const CHEV = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

/* ---------- state ---------- */
let state = load();
let activeTab = "clients";

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (!Array.isArray(s.clients)) s.clients = [];
      if (!Array.isArray(s.expenses)) s.expenses = [];
      if (!Array.isArray(s.staff)) s.staff = [];
      if (!Array.isArray(s.incomes)) s.incomes = [];
      return s;
    }
  } catch (e) {}
  return { clients: [], expenses: [], staff: [], incomes: [] };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- helpers ---------- */
const groupNum = n => (String(Math.round(Math.abs(n)) || 0)).replace(/\B(?=(\d{3})+(?!\d))/g, " ");
const fmt = n => groupNum(n) + " ₼";
const signed = n => (n < 0 ? "−" : "") + fmt(Math.abs(n));
const todayISO = () => new Date().toISOString().slice(0, 10);
const monthKey = iso => (iso || "").slice(0, 7);
const nowMonth = () => todayISO().slice(0, 7);

function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  return `${d.getDate()} ${AZ_MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtMonthTitle(mk) {
  const d = new Date(mk + "-01T00:00:00");
  if (isNaN(d)) return mk;
  return `${AZ_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtToday() {
  const d = new Date();
  return `${d.getDate()} ${AZ_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function paidThisMonth(c) {
  const m = nowMonth();
  return c.payments.filter(p => monthKey(p.date) === m).reduce((s, p) => s + p.amount, 0);
}
const totalPaid = c => c.payments.reduce((s, p) => s + p.amount, 0);
const monthRemaining = c => Math.max(0, (c.monthly || 0) - paidThisMonth(c));

const spentThisMonth = () => state.expenses.filter(e => monthKey(e.date) === nowMonth()).reduce((s, e) => s + e.amount, 0);
const spentTotal = () => state.expenses.reduce((s, e) => s + e.amount, 0);
const gotThisMonth = () => state.clients.filter(c => !c.paused).reduce((s, c) => s + paidThisMonth(c), 0);

const staffPaidThisMonth = m => m.payments.filter(p => monthKey(p.date) === nowMonth()).reduce((s, p) => s + p.amount, 0);
const staffTotal = m => m.payments.reduce((s, p) => s + p.amount, 0);
const staffMonthAll = () => state.staff.reduce((s, m) => s + staffPaidThisMonth(m), 0);
const staffAll = () => state.staff.reduce((s, m) => s + staffTotal(m), 0);

const incomeLeft = inc => Math.max(0, (inc.total || 0) - (inc.taken || 0));
const incomeTotalAll = () => state.incomes.reduce((s, i) => s + (i.total || 0), 0);
const incomeTakenAll = () => state.incomes.reduce((s, i) => s + (i.taken || 0), 0);
const incomeLeftAll = () => state.incomes.reduce((s, i) => s + incomeLeft(i), 0);

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}
function avatarHTML(name) {
  const s = String(name || "");
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  const letter = (s.trim()[0] || "?").toUpperCase();
  return `<span class="ava" style="--h:${h % 360}">${escapeHtml(letter)}</span>`;
}
function hero(label, value) {
  return `<div class="hero"><div class="hk">${label}</div><div class="hv num">${value}</div></div>`;
}
function mini(label, value, cls) {
  return `<div class="mini"><div class="mk">${label}</div><div class="mv num ${cls||""}">${value}</div></div>`;
}

/* ---------- render ---------- */
function render() {
  $("#today").textContent = fmtToday();
  renderClients();
  renderIncome();
  renderStaff();
  renderExpenses();
  save();
}

/* ---- müştərilər ---- */
function renderClients() {
  const active = state.clients.filter(c => !c.paused);
  const expected = active.reduce((s, c) => s + (c.monthly || 0), 0);
  const cost = active.reduce((s, c) => s + (c.cost || 0), 0);
  const got = active.reduce((s, c) => s + paidThisMonth(c), 0);
  const remain = active.reduce((s, c) => s + monthRemaining(c), 0);

  $("#clientHero").innerHTML =
    hero("Aylıq xalis mənfəət", signed(expected - cost)) +
    `<div class="mini-row">${mini("Gözlənilən", fmt(expected))}${mini("Bu ay alınan", fmt(got), "good")}${mini("Qalıq", fmt(remain), remain > 0 ? "warn" : "good")}</div>`;
  $("#clientCount").textContent = state.clients.length || "";

  const list = $("#list");
  if (state.clients.length === 0) {
    list.innerHTML = `<div class="empty">Hələ müştəri yoxdur.<br>Aşağıdakı «+» düyməsi ilə əlavə edin.</div>`;
    return;
  }
  const sorted = [...state.clients].sort((a, b) =>
    (a.paused === b.paused) ? a.name.localeCompare(b.name, "az") : (a.paused ? 1 : -1));

}

function clientRow(c) {
  const got = paidThisMonth(c);

  const cost = c.cost || 0;

    ? pays.map(p => `<tr>

        <td class="pn">${p.note ? escapeHtml(p.note) : ""}</td>
        <td class="amt num">${fmt(p.amount)}</td>

      </tr>`).join("")
    : `<tr><td colspan="4" class="empty-pays">Hələ ödəniş olmayıb.</td></tr>`;

  <div class="row ${c.open ? "open" : ""} ${c.paused ? "paused" : ""}">
    <div class="row-head" data-act="toggle" data-c="${c.id}">
      ${avatarHTML(c.name)}

      </div>
      <div class="row-end">
        ${(c.monthly || cost) ? `<div class="row-val ${profit < 0 ? "red" : "good"}">${signed(profit)}</div><div class="row-vsub">mənfəət/ay</div>` : ""}
      </div>
      <span class="chev">${CHEV}</span>
    </div>
    <div class="row-body">
      <div class="badges">
        ${cost > 0 ? `<span class="badge"><span class="bl">maya</span><b class="num">${fmt(cost)}</b></span>` : ""}
        ${c.monthly > 0 ? `<span class="badge ${rem === 0 && got > 0 ? "good" : "warn"}"><span class="bl">${rem === 0 && got > 0 ? "bu ay" : "qalıq"}</span><b class="num">${rem === 0 && got > 0 ? "ödənilib" : fmt(rem)}</b></span>` : ""}
        <span class="badge"><span class="bl">cəmi ödənilib</span><b class="num">${fmt(total)}</b></span>
        <span class="badge"><span class="bl">ödəniş</span><b class="num">${c.payments.length}</b></span>

      <form class="payadd" data-act="addpay" data-c="${c.id}">

        <input name="note" placeholder="şərh (istəyə görə)">
        <button class="btn primary" type="submit">Ödənişi yaz</button>
      </form>
      <table class="pays"><tbody>${paysRows}</tbody></table>
      <div class="row-actions">
        <button class="btn" data-act="edit" data-c="${c.id}">Düzəliş</button>
        <button class="btn" data-act="pause" data-c="${c.id}">${c.paused ? "Davam et" : "Pauza"}</button>
        <button class="btn danger" data-act="delclient" data-c="${c.id}">Sil</button>
      </div>
    </div>
  </div>`;
}

/* ---- xərclər ---- */
function renderExpenses() {
  const got = gotThisMonth();
  const spent = spentThisMonth();
  $("#expHero").innerHTML =
    hero("Ay balansı", signed(got - spent)) +
    `<div class="mini-row">${mini("Bu ay xərclənən", fmt(spent), "red")}${mini("Bu ay alınan", fmt(got), "good")}${mini("Cəmi xərclənən", fmt(spentTotal()))}</div>`;

  const list = $("#expList");
  if (state.expenses.length === 0) {
    list.innerHTML = `<div class="empty">Hələ xərc yoxdur.<br>Aşağıdakı «+» düyməsi ilə yazın.</div>`;
    return;
  }
  const byMonth = {};
  for (const e of state.expenses) { const mk = monthKey(e.date) || "—"; (byMonth[mk] ||= []).push(e); }
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));

  list.innerHTML = months.map(mk => {
    const items = byMonth[mk].sort((a, b) => b.date.localeCompare(a.date));
    const sum = items.reduce((s, e) => s + e.amount, 0);
    const rows = items.map(e => `
      <div class="row">
        <div class="row-head static">
          ${avatarHTML(e.title)}
          <div class="row-mid">
            <div class="row-title"><span class="nm">${escapeHtml(e.title)}</span></div>
            <div class="row-sub">${fmtDate(e.date)}${e.note ? " · " + escapeHtml(e.note) : ""}</div>
          </div>
          <div class="row-end"><div class="row-val red">−${fmt(e.amount)}</div></div>
          <button class="btn ico" data-act="delexp" data-e="${e.id}" title="Sil">✕</button>
        </div>
      </div>`).join("");
    return `<div class="sec" style="margin-top:2px">${fmtMonthTitle(mk)} <span class="sec-c num">${fmt(sum)}</span></div><div class="rows">${rows}</div>`;
  }).join("");
}

function openSheet() {
  $("#sheetTitle").textContent = SHEET_TITLES[activeTab];

  $("#sheet").classList.add("open");

}

/* ---------- удаление в два нажатия ---------- */
function armedDelete(btn, onConfirm) {
  if (btn.dataset.armed === "1") { onConfirm(); return; }
  btn.dataset.armed = "1";
  btn.dataset.orig = btn.textContent;
  btn.textContent = "Əminsən?";
  btn.classList.add("armed");
  setTimeout(() => {
    if (btn.isConnected && btn.dataset.armed === "1") {
      btn.dataset.armed = "";
      btn.textContent = btn.dataset.orig || "Sil";
      btn.classList.remove("armed");
    }
  }, 3000);
}

function getClient(id) { return state.clients.find(c => c.id === id); }

$("#addForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = $("#cName").value.trim();
  if (!name) return;
  const monthly = Math.max(0, Number($("#cMonthly").value) || 0);
  const cost = Math.max(0, Number($("#cCost").value) || 0);
  const note = $("#cNoteIn").value.trim();
  state.clients.push({ id: uid(), name, monthly, cost, note, paused: false, open: false, payments: [] });
  e.target.reset(); closeSheet(); render();
});

$("#list").addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  const c = getClient(btn.dataset.c);
  if (!c) return;
  const act = btn.dataset.act;
  if (act === "toggle") { c.open = !c.open; render(); }
  else if (act === "pause") { c.paused = !c.paused; render(); }
  else if (act === "delclient") armedDelete(btn, () => { state.clients = state.clients.filter(x => x.id !== c.id); render(); });
  else if (act === "delpay") { c.payments = c.payments.filter(p => p.id !== btn.dataset.p); render(); }
  else if (act === "edit") editClient(c);
});

$("#list").addEventListener("submit", e => {
  const form = e.target.closest("form[data-act='addpay']");
  if (!form) return;
  e.preventDefault();
  const c = getClient(form.dataset.c);
  if (!c) return;
  const amount = Math.max(0, Number(form.amount.value) || 0);
  if (!amount) return;
  c.payments.push({ id: uid(), amount, date: form.date.value || todayISO(), note: form.note.value.trim() });
  c.open = true; render();
});

function editClient(c) {
  const name = prompt("Müştəri / şirkət adı:", c.name); if (name === null) return;
  const monthly = prompt("Aylıq ödəniş, ₼ (yoxdursa 0):", c.monthly || 0); if (monthly === null) return;
  const cost = prompt("Aylıq maya, ₼ (yoxdursa 0):", c.cost || 0); if (cost === null) return;
  const note = prompt("Qeyd:", c.note || ""); if (note === null) return;
  c.name = name.trim() || c.name;
  c.monthly = Math.max(0, Number(monthly) || 0);
  c.cost = Math.max(0, Number(cost) || 0);
  c.note = note.trim();
  render();
}

    `<div class="mini-row">${mini("Alınmalı", fmt(incomeTotalAll()))}${mini("Alınıb", fmt(incomeTakenAll()), "good")}</div>`;
}

$("#incomeList").addEventListener("click", e => {
  const btn = e.target.closest("[data-act='delincome']");
  if (!btn) return;
  armedDelete(btn, () => { state.incomes = state.incomes.filter(x => x.id !== btn.dataset.i); render(); });
});

/* ---------- backup ---------- */
$("#exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ucot-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});
$("#importBtn").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.clients)) throw new Error("format");
      if (!Array.isArray(data.expenses)) data.expenses = [];
      if (!Array.isArray(data.staff)) data.staff = [];
      if (!Array.isArray(data.incomes)) data.incomes = [];
      if (!confirm("Cari məlumatlar faylla əvəz olunsun?")) return;
      state = data; render();
    } catch (err) {
      alert("Fayl oxunmadı: bu, ehtiyat nüsxəyə oxşamır.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
