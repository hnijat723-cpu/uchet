<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Учёт — клиенты и расходы</title>

<!-- PWA: устанавливается на главный экран, работает офлайн -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#eef1f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#080c14" media="(prefers-color-scheme: dark)">
<!-- iPhone (Safari «На экран Домой») -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Учёт">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png" type="image/png">

<style>
  @font-face {
    font-family: "Montserrat"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/montserrat-cyrillic.woff2") format("woff2");
    unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
  }
  @font-face {
    font-family: "Montserrat"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/montserrat-cyrillic-ext.woff2") format("woff2");
    unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;
  }
  @font-face {
    font-family: "Montserrat"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/montserrat-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Montserrat"; font-style: normal; font-weight: 400 800; font-display: swap;
    src: url("fonts/montserrat-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  :root {
    --bg: #eef1f7;
    --card: #ffffff;
    --ink: #0c111c;
    --muted: #5a6473;
    --muted-2: #97a0af;
    --line: #e3e8f0;
    --line-2: #eef1f7;
    --accent: #0d9488;
    --accent-2: #06b6d4;
    --grad: linear-gradient(135deg, #10b8a6, #22d3ee);
    --glow: rgba(13,148,136,.28);
    --ring: rgba(13,148,136,.20);
    --accent-soft: #e0f5f1;
    --good: #0f9d76;
    --good-soft: #e3f6ef;
    --warn: #c2410c;
    --warn-soft: #fdeee4;
    --red: #e11d48;
    --red-soft: #fde7ec;
    --bar-bg: rgba(255,255,255,.72);
    --hi: rgba(255,255,255,.65);
    --shadow: 0 1px 2px rgba(15,23,42,.04), 0 10px 26px rgba(15,23,42,.08), 0 30px 60px rgba(15,23,42,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #080c14;
      --card: #111a28;
      --ink: #e9f0f8;
      --muted: #93a1b6;
      --muted-2: #5c6a7f;
      --line: rgba(255,255,255,.09);
      --line-2: rgba(255,255,255,.05);
      --accent: #2dd4bf;
      --accent-2: #22d3ee;
      --grad: linear-gradient(135deg, #2dd4bf, #22d3ee);
      --glow: rgba(45,212,191,.35);
      --ring: rgba(45,212,191,.28);
      --accent-soft: rgba(45,212,191,.12);
      --good: #34d399;
      --good-soft: rgba(52,211,153,.13);
      --warn: #fb9a5a;
      --warn-soft: rgba(251,146,60,.14);
      --red: #fb7185;
      --red-soft: rgba(251,113,133,.14);
      --bar-bg: rgba(12,18,30,.68);
      --hi: rgba(255,255,255,.06);
      --shadow: 0 1px 2px rgba(0,0,0,.45), 0 14px 34px rgba(0,0,0,.5), 0 32px 64px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background-color: var(--bg);
    background-image:
      radial-gradient(900px 520px at 100% -8%, var(--accent-soft), transparent 55%),
      radial-gradient(820px 480px at -10% 0%, rgba(34,211,238,.08), transparent 55%);
    background-attachment: fixed;
    color: var(--ink);
    font: 15px/1.55 "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    letter-spacing: -.011em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 80px; }
  .num { font-variant-numeric: tabular-nums; }

  /* header */
  .top { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
  .brand { display: flex; align-items: center; gap: 13px; }
  .logo {
    width: 48px; height: 48px; border-radius: 15px; flex: 0 0 auto; display: block;
    box-shadow: 0 8px 20px rgba(4,12,24,.28), inset 0 1px 0 rgba(255,255,255,.15);
  }
  h1 { font-size: 23px; font-weight: 800; margin: 0; letter-spacing: -.03em; color: var(--ink); }
  .top .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* tabs */
  .tabs { display: inline-flex; gap: 4px; background: var(--line-2); border: 1px solid var(--line); padding: 5px; border-radius: 14px; margin-bottom: 22px; }
  .tab {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    padding: 8px 15px; border-radius: 10px; font: inherit; font-weight: 550; transition: .16s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }
  .tab.active .ti { color: var(--accent); }
  .tab .pill { font-size: 11px; font-weight: 600; color: var(--muted-2); }
  .tab.active .pill { color: var(--accent); }
  .tab .ti { display: inline-flex; }
  .tab .ti svg { width: 17px; height: 17px; display: block; }

  /* summary */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .summary.cols3 { grid-template-columns: repeat(3, 1fr); }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 16px 17px; box-shadow: var(--shadow), inset 0 1px 0 var(--hi);
  }
  .stat .k { color: var(--muted); font-size: 12px; font-weight: 600; margin-bottom: 7px; }
  .stat .v { font-size: 22px; font-weight: 800; letter-spacing: -.03em; }
  .stat.accent .v { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stat.good .v { color: var(--good); }
  .stat.warn .v { color: var(--warn); }
  .stat.red .v { color: var(--red); }

  /* add row */
  .add {
    background: var(--card); border: 1px solid var(--line); border-radius: 20px;
    padding: 16px; margin-bottom: 22px; box-shadow: var(--shadow), inset 0 1px 0 var(--hi);
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  input, button, textarea { font: inherit; }
  input {
    background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; padding: 10px 13px; outline: none; transition: .15s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  input[type="date"] { color-scheme: light dark; }
  .add input.grow { flex: 1 1 180px; }
  .add input.money { width: 130px; }

  .btn {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 13px; padding: 10px 15px; cursor: pointer; transition: .14s; font-weight: 600;
    box-shadow: 0 1px 2px rgba(4,12,24,.06), inset 0 1px 0 var(--hi);
  }
  .btn:hover { border-color: var(--muted-2); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    border: none; color: #062a23; font-weight: 700; letter-spacing: -.01em;
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.55),
      inset 0 -3px 8px rgba(3,20,15,.18),
      0 8px 18px var(--glow),
      0 2px 5px rgba(4,12,24,.18);
  }
  .btn.primary:hover { filter: brightness(1.04); }
  .btn.primary:active {
    transform: translateY(1px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), inset 0 -1px 4px rgba(3,20,15,.2), 0 4px 10px var(--glow);
  }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--muted); padding: 6px 8px; }
  .btn.ghost:hover { color: var(--ink); background: var(--line-2); }
  .btn.tiny { padding: 4px 8px; font-size: 12px; }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
  /* Взведённое удаление (две нажатия) — работает без системного окна, важно для iPhone */
  .btn.armed { background: var(--red); border-color: var(--red); color: #fff; }

  /* client card */
  .client { background: var(--card); border: 1px solid var(--line); border-radius: 20px; margin-bottom: 14px; box-shadow: var(--shadow), inset 0 1px 0 var(--hi); overflow: hidden; }
  .client.paused { opacity: .62; }
  .chead { display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 16px 18px; }
  .cname { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; letter-spacing: .01em; }
  .tag.paused { background: var(--line-2); color: var(--muted); }
  .cmeta { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .cmeta b { color: var(--ink); font-weight: 600; }
  .cnote { color: var(--muted); font-size: 13px; margin-top: 6px; font-style: italic; }
  .cactions { display: flex; gap: 2px; flex-shrink: 0; }

  .cbadges { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 18px 14px; }
  .badge { font-size: 12.5px; padding: 6px 11px; border-radius: 10px; display: inline-flex; gap: 6px; align-items: baseline; }
  .badge .bl { color: var(--muted); }
  .badge b { font-weight: 650; }
  .badge.good { background: var(--good-soft); color: var(--good); }
  .badge.good .bl { color: var(--good); opacity: .8; }
  .badge.warn { background: var(--warn-soft); color: var(--warn); }
  .badge.warn .bl { color: var(--warn); opacity: .8; }
  .badge.red { background: var(--red-soft); color: var(--red); }
  .badge.red .bl { color: var(--red); opacity: .8; }
  .badge.flat { background: var(--line-2); }

  .cbody { border-top: 1px solid var(--line-2); padding: 14px 18px; display: none; }
  .client.open .cbody { display: block; }

  .payadd { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
  .payadd input.money { width: 120px; }
  .payadd input.pnote { flex: 1 1 140px; }

  table.pays { width: 100%; border-collapse: collapse; }
  table.pays td { padding: 8px 6px; border-bottom: 1px solid var(--line-2); font-size: 14px; }
  table.pays tr:last-child td { border-bottom: none; }
  table.pays .amt { font-weight: 600; text-align: right; white-space: nowrap; }
  table.pays .dt { color: var(--muted); width: 120px; white-space: nowrap; }
  table.pays .pn { color: var(--muted); }
  table.pays .del { width: 34px; text-align: right; }
  .empty-pays { color: var(--muted-2); font-size: 13px; padding: 6px 0; }

  /* expenses list */
  .exp-card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow), inset 0 1px 0 var(--hi); overflow: hidden; }
  .exp-group-h { padding: 12px 18px 6px; font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--muted-2); display: flex; justify-content: space-between; }
  .exp-group-h .sum { color: var(--muted); }
  table.exp { width: 100%; border-collapse: collapse; }
  table.exp td { padding: 11px 18px; border-top: 1px solid var(--line-2); font-size: 14px; vertical-align: baseline; }
  table.exp .dt { color: var(--muted); width: 110px; white-space: nowrap; }
  table.exp .ti { font-weight: 500; }
  table.exp .en { color: var(--muted); font-size: 13px; }
  table.exp .amt { font-weight: 600; text-align: right; white-space: nowrap; color: var(--red); }
  table.exp .del { width: 34px; text-align: right; }

  /* приходы: инлайн-редактирование (без всплывающих окон) */
  .inc-name {
    font-size: 16px; font-weight: 600; width: 100%; max-width: 280px;
    background: transparent; border: 1px solid transparent; color: var(--ink);
    border-radius: 8px; padding: 4px 6px;
  }
  .inc-name:focus { border-color: var(--accent); background: var(--bg); }
  .inc-fields { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; padding-left: 6px; }
  .inc-fields label { font-size: 12.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .inc-fields input { width: 108px; }

  .empty {
    text-align: center; color: var(--muted); padding: 48px 20px;
    border: 1px dashed var(--line); border-radius: 16px; background: var(--card);
  }

  .tools { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 30px; color: var(--muted); }
  .tools .hint { flex-basis: 100%; text-align: center; font-size: 12px; color: var(--muted-2); margin-bottom: 4px; }

  [hidden] { display: none !important; }

  @media (max-width: 640px) {
    /* Отступы с учётом Dynamic Island сверху и нижней панели вкладок снизу */
    .wrap {
      padding: calc(14px + env(safe-area-inset-top)) 16px
               calc(90px + env(safe-area-inset-bottom));
    }

    /* Сводка — свайпаемая лента карточек (как в приложениях iOS) */
    .summary, .summary.cols3 {
      display: flex; grid-template-columns: none;
      gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch; padding-bottom: 4px;
    }
    .summary::-webkit-scrollbar { display: none; }
    .stat { flex: 0 0 44%; scroll-snap-align: start; }

    /* Формы — поля на всю ширину, крупные под палец */
    .add { gap: 8px; padding: 12px; }
    .add input, .add .grow, .add .money { flex: 1 1 100%; width: 100%; }
    .add .btn.primary { width: 100%; }
    input { min-height: 48px; }

    .payadd input, .payadd .money, .payadd .pnote { flex: 1 1 100%; width: 100%; }
    .payadd .btn { width: 100%; }

    .inc-fields label { flex: 1 1 calc(50% - 6px); }
    .inc-fields input { width: 100%; }
    .inc-name { max-width: 100%; font-size: 17px; }

    /* Действия в карточке — заметные кнопки-пилюли, а не мелкий текст */
    .chead { flex-direction: column; }
    .cactions { order: 3; flex-wrap: wrap; gap: 8px; width: 100%; }
    .cactions .btn { border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; font-size: 13px; color: var(--ink); }
    .cactions .btn.danger { color: var(--red); }
    .cactions .btn.armed { color: #fff; }

    /* Нижняя навигация — стеклянная, как таббар в приложении */
    .tabs {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
      display: flex; gap: 0; margin: 0; border-radius: 0;
      border: none; border-top: 1px solid var(--line);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      background: var(--bar-bg);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      box-shadow: 0 -6px 24px rgba(0,0,0,.10);
    }
    .tab {
      position: relative; flex: 1; flex-direction: column; gap: 5px; padding: 3px 2px;
      border-radius: 14px; font-size: 10.5px; font-weight: 700; color: var(--muted);
      transition: color .16s;
    }
    .tab .ti {
      display: grid; place-items: center; width: 48px; height: 40px; border-radius: 13px;
      transition: transform .18s, background .18s, box-shadow .18s;
    }
    .tab .ti svg { width: 23px; height: 23px; }
    .tab .tl { display: block; }
    .tab .pill { display: none; }
    .tab.active { color: var(--accent); }
    .tab.active .ti {
      color: #fff; transform: translateY(-2px);
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        inset 0 -3px 7px rgba(3,20,15,.22),
        0 7px 15px var(--glow),
        0 1px 3px rgba(4,12,24,.28);
    }
    .tab.active .ti svg { stroke-width: 1.9; filter: drop-shadow(0 1px 1px rgba(0,0,0,.25)); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <img class="logo" src="icon-192.png" alt="" width="48" height="48">
      <div>
        <h1>Учёт</h1>
        <div class="sub">клиенты и личные расходы · <span id="today"></span></div>
      </div>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="clients"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.1"/><path d="M2.8 19.2a6.2 6.2 0 0 1 12.4 0"/><path d="M16.5 5.3a3 3 0 0 1 0 5.6"/><path d="M17.7 19.2a6.2 6.2 0 0 0-2.4-4.9"/></svg></span><span class="tl">Клиенты</span> <span class="pill">доход</span></button>
    <button class="tab" data-tab="income"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.4"/><path d="M12 7.7v8.6"/><path d="M8.6 12.9 12 16.3l3.4-3.4"/></svg></span><span class="tl">Приходы</span> <span class="pill">разовые</span></button>
    <button class="tab" data-tab="staff"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7.5" width="18" height="12.5" rx="2.4"/><path d="M8.3 7.5V6.2a2.2 2.2 0 0 1 2.2-2.2h3a2.2 2.2 0 0 1 2.2 2.2v1.3"/><path d="M3 12.4h18"/></svg></span><span class="tl">Сотрудники</span> <span class="pill">−</span></button>
    <button class="tab" data-tab="expenses"><span class="ti" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.6h12v16.8l-2.2-1.4-2.3 1.4-2.3-1.4-2.2 1.4L6 20.4z"/><path d="M9 8h6M9 11.6h6M9 15.2h4"/></svg></span><span class="tl">Расходы</span> <span class="pill">−</span></button>
  </div>

  <!-- ===== КЛИЕНТЫ ===== -->
  <section id="view-clients">
    <div class="summary cols3" id="summary"></div>

    <form class="add" id="addForm" autocomplete="off">
      <input class="grow" id="cName" placeholder="Имя клиента / компания" required>
      <input class="money num" id="cMonthly" type="number" min="0" step="1" placeholder="в месяц, ₼">
      <input class="money num" id="cCost" type="number" min="0" step="1" placeholder="себест., ₼">
      <input class="grow" id="cNoteIn" placeholder="заметка (необязательно)" style="flex-basis:140px">
      <button class="btn primary" type="submit">Добавить клиента</button>
    </form>

    <div id="list"></div>
  </section>

  <!-- ===== ПРИХОДЫ (разовые/хаотичные) ===== -->
  <section id="view-income" hidden>
    <div class="summary cols3" id="incomeSummary"></div>

    <form class="add" id="incomeForm" autocomplete="off">
      <input class="grow" id="iName" placeholder="Имя клиента" required>
      <input class="money num" id="iTotal" type="number" min="0" step="1" placeholder="всего, ₼" required>
      <input class="money num" id="iTaken" type="number" min="0" step="1" placeholder="уже взяли, ₼">
      <button class="btn primary" type="submit">Добавить приход</button>
    </form>

    <div id="incomeList"></div>
  </section>

  <!-- ===== СОТРУДНИКИ ===== -->
  <section id="view-staff" hidden>
    <div class="summary cols3" id="staffSummary"></div>

    <form class="add" id="staffForm" autocomplete="off">
      <input class="grow" id="sName" placeholder="Имя сотрудника" required>
      <input class="grow" id="sRole" placeholder="Роль (фотограф, видео, моушн…)" style="flex-basis:190px">
      <input class="grow" id="sNote" placeholder="заметка" style="flex-basis:130px">
      <button class="btn primary" type="submit">Добавить сотрудника</button>
    </form>

    <div id="staffList"></div>
  </section>

  <!-- ===== РАСХОДЫ ===== -->
  <section id="view-expenses" hidden>
    <div class="summary" id="expSummary"></div>

    <form class="add" id="expForm" autocomplete="off">
      <input class="grow" id="eTitle" placeholder="Куда / на что" required>
      <input class="money num" id="eAmount" type="number" min="0" step="1" placeholder="сумма, ₼" required>
      <input id="eDate" type="date" required>
      <input class="grow" id="eNote" placeholder="комментарий" style="flex-basis:140px">
      <button class="btn primary" type="submit">Записать расход</button>
    </form>

    <div id="expList"></div>
  </section>

  <div class="tools">
    <div class="hint">Данные хранятся только в этом браузере. Делайте бэкап регулярно.</div>
    <button class="btn tiny" id="exportBtn">↓ Экспорт (бэкап)</button>
    <button class="btn tiny" id="importBtn">↑ Импорт</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>

</div>

<script>
"use strict";

const KEY = "clients-tracker/v1";
const $ = (s, r=document) => r.querySelector(s);

/* ---------- state ---------- */
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (!Array.isArray(s.clients)) s.clients = [];
      if (!Array.isArray(s.expenses)) s.expenses = []; // добавлено в v1.1
      if (!Array.isArray(s.staff)) s.staff = [];       // добавлено в v1.2
      if (!Array.isArray(s.incomes)) s.incomes = [];   // добавлено в v1.3
      return s;
    }
  } catch (e) {}
  return { clients: [], expenses: [], staff: [], incomes: [] };
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

/* ---------- helpers ---------- */
const fmt = n => (Math.round(n) || 0).toLocaleString("ru-RU") + " ₼";
const todayISO = () => new Date().toISOString().slice(0, 10);
const monthKey = iso => (iso || "").slice(0, 7);
const nowMonth = () => todayISO().slice(0, 7);

function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  return d.toLocaleDateString("ru-RU", { day: "numeric", month: "short", year: "numeric" });
}
function fmtMonthTitle(mk) {
  const d = new Date(mk + "-01T00:00:00");
  if (isNaN(d)) return mk;
  return d.toLocaleDateString("ru-RU", { month: "long", year: "numeric" });
}

function paidThisMonth(c) {
  const m = nowMonth();
  return c.payments.filter(p => monthKey(p.date) === m).reduce((s, p) => s + p.amount, 0);
}
const totalPaid = c => c.payments.reduce((s, p) => s + p.amount, 0);
const monthRemaining = c => Math.max(0, (c.monthly || 0) - paidThisMonth(c));

const spentThisMonth = () => state.expenses.filter(e => monthKey(e.date) === nowMonth()).reduce((s, e) => s + e.amount, 0);
const spentTotal = () => state.expenses.reduce((s, e) => s + e.amount, 0);
const gotThisMonth = () => state.clients.filter(c => !c.paused).reduce((s, c) => s + paidThisMonth(c), 0);

const staffPaidThisMonth = m => m.payments.filter(p => monthKey(p.date) === nowMonth()).reduce((s, p) => s + p.amount, 0);
const staffTotal = m => m.payments.reduce((s, p) => s + p.amount, 0);
const staffMonthAll = () => state.staff.reduce((s, m) => s + staffPaidThisMonth(m), 0);
const staffAll = () => state.staff.reduce((s, m) => s + staffTotal(m), 0);

const incomeLeft = inc => Math.max(0, (inc.total || 0) - (inc.taken || 0));
const incomeTotalAll = () => state.incomes.reduce((s, i) => s + (i.total || 0), 0);
const incomeTakenAll = () => state.incomes.reduce((s, i) => s + (i.taken || 0), 0);
const incomeLeftAll = () => state.incomes.reduce((s, i) => s + incomeLeft(i), 0);

/* ---------- render ---------- */
function render() {
  $("#today").textContent = new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" });
  renderClientSummary();
  renderList();
  renderIncomeSummary();
  renderIncomeList();
  renderStaffSummary();
  renderStaffList();
  renderExpSummary();
  renderExpList();
  save();
}

function statCard(k, v, cls) {
  return `<div class="stat ${cls||""}"><div class="k">${k}</div><div class="v num">${v}</div></div>`;
}

function renderClientSummary() {
  const active = state.clients.filter(c => !c.paused);
  const expected = active.reduce((s, c) => s + (c.monthly || 0), 0);
  const cost = active.reduce((s, c) => s + (c.cost || 0), 0);
  const profit = expected - cost;                         // доход − себестоимость
  const got = active.reduce((s, c) => s + paidThisMonth(c), 0);
  const remain = active.reduce((s, c) => s + monthRemaining(c), 0);
  const cnt = state.clients.length + (state.clients.some(c => c.paused) ? ` · ${active.length} активных` : "");

  $("#summary").innerHTML =
    statCard("Ожидается в месяц", fmt(expected), "accent") +
    statCard("Себестоимость в месяц", fmt(cost), "warn") +
    statCard("Чистая прибыль в месяц", (profit < 0 ? "−" : "") + fmt(Math.abs(profit)), profit < 0 ? "red" : "good") +
    statCard("Получено в этом месяце", fmt(got), "good") +
    statCard("Остаток за месяц", fmt(remain), remain > 0 ? "warn" : "good") +
    statCard("Клиентов", cnt);
}

function renderExpSummary() {
  const got = gotThisMonth();
  const spent = spentThisMonth();
  const balance = got - spent;
  $("#expSummary").innerHTML =
    statCard("Потрачено в этом месяце", fmt(spent), "red") +
    statCard("Получено в этом месяце", fmt(got), "good") +
    statCard("Баланс месяца", (balance < 0 ? "−" : "") + fmt(Math.abs(balance)), balance < 0 ? "red" : "good") +
    statCard("Потрачено всего", fmt(spentTotal()));
}

function renderList() {
  const list = $("#list");
  if (state.clients.length === 0) {
    list.innerHTML = `<div class="empty">Пока нет клиентов.<br>Добавьте первого в форме выше.</div>`;
    return;
  }
  const sorted = [...state.clients].sort((a, b) =>
    (a.paused === b.paused) ? a.name.localeCompare(b.name, "ru") : (a.paused ? 1 : -1)
  );
  list.innerHTML = sorted.map(clientHTML).join("");
}

function clientHTML(c) {
  const got = paidThisMonth(c);
  const rem = monthRemaining(c);
  const total = totalPaid(c);
  const cost = c.cost || 0;
  const profit = (c.monthly || 0) - cost;                 // прибыль с клиента в месяц
  const monthPaid = c.monthly > 0 && rem === 0 && got > 0;

  const monthBadge = c.monthly > 0
    ? (monthPaid
        ? `<span class="badge good"><span class="bl">этот месяц</span><b>оплачен</b></span>`
        : `<span class="badge warn"><span class="bl">остаток за месяц</span><b class="num">${fmt(rem)}</b></span>`)
    : "";

  const profitBadge = (c.monthly || cost)
    ? `<span class="badge ${profit < 0 ? "red" : "good"}"><span class="bl">прибыль/мес</span><b class="num">${(profit < 0 ? "−" : "") + fmt(Math.abs(profit))}</b></span>`
    : "";

  const pays = c.payments.slice().sort((a, b) => b.date.localeCompare(a.date));
  const paysRows = pays.length
    ? pays.map(p => `<tr>
        <td class="dt num">${fmtDate(p.date)}</td>
        <td class="pn">${p.note ? escapeHtml(p.note) : ""}</td>
        <td class="amt num">${fmt(p.amount)}</td>
        <td class="del"><button class="btn ghost tiny" data-act="delpay" data-c="${c.id}" data-p="${p.id}" title="Удалить платёж">✕</button></td>
      </tr>`).join("")
    : `<tr><td colspan="4" class="empty-pays">Платежей ещё не было.</td></tr>`;

  return `
  <div class="client ${c.open ? "open" : ""} ${c.paused ? "paused" : ""}">
    <div class="chead">
      <div>
        <div class="cname">
          ${escapeHtml(c.name)}
          ${c.paused ? `<span class="tag paused">на паузе</span>` : ""}
        </div>
        <div class="cmeta">
          ${c.monthly > 0 ? `<b class="num">${fmt(c.monthly)}</b> в месяц · ` : ""}${cost > 0 ? `себест. <b class="num">${fmt(cost)}</b> · ` : ""}получено в этом месяце <b class="num">${fmt(got)}</b>
        </div>
        ${c.note ? `<div class="cnote">${escapeHtml(c.note)}</div>` : ""}
      </div>
      <div class="cactions">
        <button class="btn ghost tiny" data-act="toggle" data-c="${c.id}">${c.open ? "Свернуть" : "Платежи"}</button>
        <button class="btn ghost tiny" data-act="edit" data-c="${c.id}">Изменить</button>
        <button class="btn ghost tiny" data-act="pause" data-c="${c.id}">${c.paused ? "Возобновить" : "Пауза"}</button>
        <button class="btn ghost tiny danger" data-act="delclient" data-c="${c.id}">Удалить</button>
      </div>
    </div>

    <div class="cbadges">
      ${monthBadge}
      ${profitBadge}
      <span class="badge flat"><span class="bl">всего оплачено</span><b class="num">${fmt(total)}</b></span>
      <span class="badge flat"><span class="bl">платежей</span><b class="num">${c.payments.length}</b></span>
    </div>

    <div class="cbody">
      <form class="payadd" data-act="addpay" data-c="${c.id}">
        <input class="money num" name="amount" type="number" min="0" step="1" placeholder="сумма, ₼" required>
        <input type="date" name="date" value="${todayISO()}" required>
        <input class="pnote" name="note" placeholder="комментарий (необязательно)">
        <button class="btn primary tiny" type="submit">Записать платёж</button>
      </form>
      <table class="pays"><tbody>${paysRows}</tbody></table>
    </div>
  </div>`;
}

function renderExpList() {
  const list = $("#expList");
  if (state.expenses.length === 0) {
    list.innerHTML = `<div class="empty">Расходов пока нет.<br>Запишите первый в форме выше.</div>`;
    return;
  }
  // Группируем по месяцам, свежие сверху.
  const byMonth = {};
  for (const e of state.expenses) {
    const mk = monthKey(e.date) || "—";
    (byMonth[mk] ||= []).push(e);
  }
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));

  list.innerHTML = months.map(mk => {
    const items = byMonth[mk].sort((a, b) => b.date.localeCompare(a.date));
    const sum = items.reduce((s, e) => s + e.amount, 0);
    const rows = items.map(e => `<tr>
        <td class="dt num">${fmtDate(e.date)}</td>
        <td class="ti">${escapeHtml(e.title)}${e.note ? `<div class="en">${escapeHtml(e.note)}</div>` : ""}</td>
        <td class="amt num">−${fmt(e.amount)}</td>
        <td class="del"><button class="btn ghost tiny" data-act="delexp" data-e="${e.id}" title="Удалить расход">✕</button></td>
      </tr>`).join("");
    return `<div class="exp-card" style="margin-bottom:14px">
      <div class="exp-group-h"><span>${fmtMonthTitle(mk)}</span><span class="sum num">${fmt(sum)}</span></div>
      <table class="exp"><tbody>${rows}</tbody></table>
    </div>`;
  }).join("");
}

/* ---------- приходы: рендер ---------- */
function renderIncomeSummary() {
  const left = incomeLeftAll();
  $("#incomeSummary").innerHTML =
    statCard("Должны взять", fmt(incomeTotalAll()), "accent") +
    statCard("Уже взяли", fmt(incomeTakenAll()), "good") +
    statCard("Осталось получить", fmt(left), left > 0 ? "warn" : "good");
}

function renderIncomeList() {
  const list = $("#incomeList");
  if (state.incomes.length === 0) {
    list.innerHTML = `<div class="empty">Разовых приходов пока нет.<br>Добавьте первый в форме выше.</div>`;
    return;
  }
  list.innerHTML = state.incomes.map(incomeHTML).join("");
}

function incomeHTML(inc) {
  const rem = incomeLeft(inc);
  const done = (inc.total || 0) > 0 && rem === 0;
  return `
  <div class="client">
    <div class="chead">
      <div style="flex:1 1 auto; min-width:0;">
        <input class="inc-name" value="${escapeHtml(inc.name)}" data-i="${inc.id}" data-f="name" placeholder="Имя клиента">
        <div class="inc-fields">
          <label>взято <input class="num" type="number" min="0" step="1" value="${inc.taken || 0}" data-i="${inc.id}" data-f="taken"></label>
          <label>всего <input class="num" type="number" min="0" step="1" value="${inc.total || 0}" data-i="${inc.id}" data-f="total"></label>
        </div>
      </div>
      <div class="cactions">
        <button class="btn ghost tiny danger" data-act="delincome" data-i="${inc.id}">Удалить</button>
      </div>
    </div>
    <div class="cbadges">
      <span class="badge ${done ? "good" : "warn"}"><span class="bl">${done ? "статус" : "осталось"}</span><b class="inc-left num">${done ? "закрыто" : fmt(rem)}</b></span>
    </div>
  </div>`;
}

/* ---------- сотрудники: рендер ---------- */
function renderStaffSummary() {
  $("#staffSummary").innerHTML =
    statCard("Выплачено в этом месяце", fmt(staffMonthAll()), "red") +
    statCard("Всего выплачено", fmt(staffAll())) +
    statCard("Сотрудников", state.staff.length);
}

function renderStaffList() {
  const list = $("#staffList");
  if (state.staff.length === 0) {
    list.innerHTML = `<div class="empty">Сотрудников пока нет.<br>Добавьте первого в форме выше.</div>`;
    return;
  }
  const sorted = [...state.staff].sort((a, b) => a.name.localeCompare(b.name, "ru"));
  list.innerHTML = sorted.map(staffHTML).join("");
}

function staffHTML(m) {
  const got = staffPaidThisMonth(m);
  const total = staffTotal(m);
  const pays = m.payments.slice().sort((a, b) => b.date.localeCompare(a.date));
  const paysRows = pays.length
    ? pays.map(p => `<tr>
        <td class="dt num">${fmtDate(p.date)}</td>
        <td class="pn">${p.note ? escapeHtml(p.note) : ""}</td>
        <td class="amt num">−${fmt(p.amount)}</td>
        <td class="del"><button class="btn ghost tiny" data-act="delpay" data-m="${m.id}" data-p="${p.id}" title="Удалить выплату">✕</button></td>
      </tr>`).join("")
    : `<tr><td colspan="4" class="empty-pays">Выплат ещё не было.</td></tr>`;

  return `
  <div class="client ${m.open ? "open" : ""}">
    <div class="chead">
      <div>
        <div class="cname">
          ${escapeHtml(m.name)}
          ${m.role ? `<span class="tag paused">${escapeHtml(m.role)}</span>` : ""}
        </div>
        <div class="cmeta">выплачено в этом месяце <b class="num">${fmt(got)}</b></div>
        ${m.note ? `<div class="cnote">${escapeHtml(m.note)}</div>` : ""}
      </div>
      <div class="cactions">
        <button class="btn ghost tiny" data-act="toggle" data-m="${m.id}">${m.open ? "Свернуть" : "Выплаты"}</button>
        <button class="btn ghost tiny" data-act="edit" data-m="${m.id}">Изменить</button>
        <button class="btn ghost tiny danger" data-act="delstaff" data-m="${m.id}">Удалить</button>
      </div>
    </div>

    <div class="cbadges">
      <span class="badge flat"><span class="bl">всего выплачено</span><b class="num">${fmt(total)}</b></span>
      <span class="badge flat"><span class="bl">выплат</span><b class="num">${m.payments.length}</b></span>
    </div>

    <div class="cbody">
      <form class="payadd" data-act="addpay" data-m="${m.id}">
        <input class="money num" name="amount" type="number" min="0" step="1" placeholder="сумма, ₼" required>
        <input type="date" name="date" value="${todayISO()}" required>
        <input class="pnote" name="note" placeholder="за что (необязательно)">
        <button class="btn primary tiny" type="submit">Записать выплату</button>
      </form>
      <table class="pays"><tbody>${paysRows}</tbody></table>
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

/* ---------- tabs ---------- */
$("#tabs").addEventListener("click", e => {
  const t = e.target.closest(".tab");
  if (!t) return;
  const tab = t.dataset.tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b === t));
  $("#view-clients").hidden = tab !== "clients";
  $("#view-income").hidden = tab !== "income";
  $("#view-staff").hidden = tab !== "staff";
  $("#view-expenses").hidden = tab !== "expenses";
});

/* ---------- удаление в два нажатия (без системного окна — важно для iPhone) ---------- */
function armedDelete(btn, onConfirm) {
  if (btn.dataset.armed === "1") { onConfirm(); return; }
  btn.dataset.armed = "1";
  btn.dataset.orig = btn.textContent;
  btn.textContent = "Точно?";
  btn.classList.add("armed");
  setTimeout(() => {
    if (btn.isConnected && btn.dataset.armed === "1") {
      btn.dataset.armed = "";
      btn.textContent = btn.dataset.orig || "Удалить";
      btn.classList.remove("armed");
    }
  }, 3000);
}

/* ---------- clients: actions ---------- */
function getClient(id) { return state.clients.find(c => c.id === id); }

$("#addForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = $("#cName").value.trim();
  if (!name) return;
  const monthly = Math.max(0, Number($("#cMonthly").value) || 0);
  const cost = Math.max(0, Number($("#cCost").value) || 0);
  const note = $("#cNoteIn").value.trim();
  state.clients.push({ id: uid(), name, monthly, cost, note, paused: false, open: true, payments: [] });
  e.target.reset();
  render();
});

$("#list").addEventListener("click", e => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const c = getClient(btn.dataset.c);
  if (!c) return;
  const act = btn.dataset.act;

  if (act === "toggle") { c.open = !c.open; render(); }
  else if (act === "pause") { c.paused = !c.paused; render(); }
  else if (act === "delclient") {
    armedDelete(btn, () => {
      state.clients = state.clients.filter(x => x.id !== c.id);
      render();
    });
  }
  else if (act === "delpay") {
    c.payments = c.payments.filter(p => p.id !== btn.dataset.p);
    render();
  }
  else if (act === "edit") editClient(c);
});

$("#list").addEventListener("submit", e => {
  const form = e.target.closest("form[data-act='addpay']");
  if (!form) return;
  e.preventDefault();
  const c = getClient(form.dataset.c);
  if (!c) return;
  const amount = Math.max(0, Number(form.amount.value) || 0);
  if (!amount) return;
  const date = form.date.value || todayISO();
  const note = form.note.value.trim();
  c.payments.push({ id: uid(), amount, date, note });
  c.open = true;
  render();
});

function editClient(c) {
  const name = prompt("Имя клиента / компания:", c.name);
  if (name === null) return;
  const monthly = prompt("Ежемесячная оплата, ₼ (0 — если нет):", c.monthly || 0);
  if (monthly === null) return;
  const cost = prompt("Себестоимость в месяц, ₼ (0 — если нет):", c.cost || 0);
  if (cost === null) return;
  const note = prompt("Заметка:", c.note || "");
  if (note === null) return;
  c.name = name.trim() || c.name;
  c.monthly = Math.max(0, Number(monthly) || 0);
  c.cost = Math.max(0, Number(cost) || 0);
  c.note = note.trim();
  render();
}

/* ---------- expenses: actions ---------- */
$("#eDate").value = todayISO();

$("#expForm").addEventListener("submit", e => {
  e.preventDefault();
  const title = $("#eTitle").value.trim();
  const amount = Math.max(0, Number($("#eAmount").value) || 0);
  if (!title || !amount) return;
  const date = $("#eDate").value || todayISO();
  const note = $("#eNote").value.trim();
  state.expenses.push({ id: uid(), title, amount, date, note });
  $("#eTitle").value = ""; $("#eAmount").value = ""; $("#eNote").value = "";
  $("#eDate").value = date; // дату оставляем — удобно вносить несколько за день
  render();
});

$("#expList").addEventListener("click", e => {
  const btn = e.target.closest("button[data-act='delexp']");
  if (!btn) return;
  state.expenses = state.expenses.filter(x => x.id !== btn.dataset.e);
  render();
});

/* ---------- сотрудники: actions ---------- */
function getStaff(id) { return state.staff.find(m => m.id === id); }

$("#staffForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = $("#sName").value.trim();
  if (!name) return;
  const role = $("#sRole").value.trim();
  const note = $("#sNote").value.trim();
  state.staff.push({ id: uid(), name, role, note, open: true, payments: [] });
  e.target.reset();
  render();
});

$("#staffList").addEventListener("click", e => {
  const btn = e.target.closest("button[data-act]");
  if (!btn) return;
  const m = getStaff(btn.dataset.m);
  if (!m) return;
  const act = btn.dataset.act;

  if (act === "toggle") { m.open = !m.open; render(); }
  else if (act === "delstaff") {
    armedDelete(btn, () => {
      state.staff = state.staff.filter(x => x.id !== m.id);
      render();
    });
  }
  else if (act === "delpay") {
    m.payments = m.payments.filter(p => p.id !== btn.dataset.p);
    render();
  }
  else if (act === "edit") editStaff(m);
});

$("#staffList").addEventListener("submit", e => {
  const form = e.target.closest("form[data-act='addpay']");
  if (!form) return;
  e.preventDefault();
  const m = getStaff(form.dataset.m);
  if (!m) return;
  const amount = Math.max(0, Number(form.amount.value) || 0);
  if (!amount) return;
  const date = form.date.value || todayISO();
  const note = form.note.value.trim();
  m.payments.push({ id: uid(), amount, date, note });
  m.open = true;
  render();
});

function editStaff(m) {
  const name = prompt("Имя сотрудника:", m.name);
  if (name === null) return;
  const role = prompt("Роль:", m.role || "");
  if (role === null) return;
  const note = prompt("Заметка:", m.note || "");
  if (note === null) return;
  m.name = name.trim() || m.name;
  m.role = role.trim();
  m.note = note.trim();
  render();
}

/* ---------- приходы: actions ---------- */
$("#incomeForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = $("#iName").value.trim();
  if (!name) return;
  const total = Math.max(0, Number($("#iTotal").value) || 0);
  const taken = Math.max(0, Number($("#iTaken").value) || 0);
  state.incomes.push({ id: uid(), name, total, taken });
  e.target.reset();
  render();
});

// Инлайн-правки: имя/взято/всего меняются прямо в карточке, без всплывающих окон.
// Полный перерендер не зовём, чтобы не терять фокус — обновляем только «осталось» и сводку.
$("#incomeList").addEventListener("input", e => {
  const el = e.target;
  const id = el.dataset.i, f = el.dataset.f;
  if (!id || !f) return;
  const inc = state.incomes.find(x => x.id === id);
  if (!inc) return;
  if (f === "name") inc.name = el.value;
  else inc[f] = Math.max(0, Number(el.value) || 0);

  const badge = el.closest(".client").querySelector(".inc-left");
  if (badge) {
    const rem = incomeLeft(inc);
    const done = (inc.total || 0) > 0 && rem === 0;
    badge.textContent = done ? "закрыто" : fmt(rem);
    badge.previousElementSibling.textContent = done ? "статус" : "осталось";
    badge.closest(".badge").className = "badge " + (done ? "good" : "warn");
  }
  renderIncomeSummary();
  save();
});

$("#incomeList").addEventListener("click", e => {
  const btn = e.target.closest("button[data-act='delincome']");
  if (!btn) return;
  armedDelete(btn, () => {
    state.incomes = state.incomes.filter(x => x.id !== btn.dataset.i);
    render();
  });
});

/* ---------- backup ---------- */
$("#exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `учёт-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});
$("#importBtn").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.clients)) throw new Error("формат");
      if (!Array.isArray(data.expenses)) data.expenses = [];
      if (!Array.isArray(data.staff)) data.staff = [];
      if (!Array.isArray(data.incomes)) data.incomes = [];
      if (!confirm("Заменить текущие данные содержимым файла?")) return;
      state = data;
      render();
    } catch (err) {
      alert("Не удалось прочитать файл: это не похоже на бэкап.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

render();

/* ---------- офлайн-режим (PWA) ---------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
